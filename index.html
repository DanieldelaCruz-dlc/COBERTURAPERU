<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COBERTURA PERÚ | Panel de Consulta</title>
    <style>
        /* =========================================
           VARIABLES Y ESTILOS BASE
           ========================================= */
        :root {
            --bg-body: #e2e8f0;
            --bg-card: #ffffff;
            --primary: #1e293b;
            --primary-light: #334155;
            --accent: #ef4444;
            --text-main: #334155;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px; /* Le da un patrón sutil al fondo para que no se vea vacío */
            margin: 0;
            padding: 20px 15px;
            color: var(--text-main);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* =========================================
           CABECERA DEL SISTEMA (BANNER)
           ========================================= */
        .app-header {
            background: linear-gradient(135deg, var(--primary) 0%, #0f172a 100%);
            border-radius: 12px;
            padding: 25px 30px;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Acento rojo superior */
        .app-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--accent);
        }

        .header-titles h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-titles p {
            margin: 5px 0 0 0;
            color: #94a3b8;
            font-size: 14px;
            font-weight: 500;
        }

        /* =========================================
           PANEL DE FILTROS (CARD)
           ========================================= */
        .filtros-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
        }

        .filtros-card-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
        }

        .filtros-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .filtro-grupo {
            display: flex;
            flex-direction: column;
        }

        .filtro-grupo label {
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .input-wrapper {
            position: relative;
        }

        .filtro-grupo input {
            width: 100%;
            padding: 10px 12px;
            font-size: 14px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
            transition: all 0.2s ease;
            background-color: #f8fafc;
            color: var(--primary);
            font-weight: 500;
        }

        .filtro-grupo input:focus {
            border-color: #3b82f6;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .filtro-grupo input::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }

        /* =========================================
           TABLA DE RESULTADOS
           ========================================= */
        .tabla-card {
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .tabla-header-info {
            padding: 15px 25px;
            background-color: #f8fafc;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .contador-resultados {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .contador-resultados span {
            color: var(--primary);
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 5px;
        }

        .tabla-wrapper {
            overflow: auto;
            max-height: 55vh;
            position: relative;
        }

        /* Scrollbars Personalizados (Chrome, Safari, Edge) */
        .tabla-wrapper::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .tabla-wrapper::-webkit-scrollbar-track {
            background: #f1f5f9; 
        }
        .tabla-wrapper::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 10px;
        }
        .tabla-wrapper::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            text-align: left;
            min-width: 900px;
        }

        th {
            background-color: var(--primary-light);
            color: #ffffff;
            font-weight: 600;
            padding: 14px 20px;
            position: sticky;
            top: 0;
            z-index: 10;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        /* Cebras para la tabla */
        tbody tr:nth-child(even) {
            background-color: #f8fafc;
        }

        td {
            padding: 12px 20px;
            border-bottom: 1px solid #f1f5f9;
            color: var(--text-main);
            vertical-align: middle;
        }

        tr:hover td {
            background-color: #f1f5f9;
        }
        
        /* =========================================
           BADGES DE ESTADO (Píldoras)
           ========================================= */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        
        .badge::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .badge.no-cubre {
            background-color: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fca5a5;
        }
        .badge.no-cubre::before { background-color: #ef4444; }

        .badge.si-cubre {
            background-color: #dcfce7;
            color: #15803d;
            border: 1px solid #86efac;
        }
        .badge.si-cubre::before { background-color: #22c55e; }

        .badge.pendiente {
            background-color: #fef9c3;
            color: #a16207;
            border: 1px solid #fde047;
        }
        .badge.pendiente::before { background-color: #eab308; }

        /* Mensajes del Sistema */
        .estado-vacio {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 20px;
            color: var(--text-muted);
        }
        .estado-vacio span {
            font-size: 40px;
            margin-bottom: 15px;
        }
        .estado-vacio h3 {
            margin: 0 0 5px 0;
            color: var(--primary);
        }
    </style>
</head>
<body>

<div class="container">
    
    <div class="app-header">
        <div class="header-titles">
            <h1>📦 COBERTURA PERÚ</h1>
            <p>Sistema de consulta rápida de zonas de despacho y cobertura.</p>
        </div>
    </div>

    <div class="filtros-card">
        <div class="filtros-card-title">🔍 Criterios de Búsqueda</div>
        <div class="filtros-container">
            <div class="filtro-grupo">
                <label for="filtroUbigeo"><span>🔢</span> UBIGEO</label>
                <input type="text" id="filtroUbigeo" placeholder="COD POSTAL" autocomplete="off">
            </div>
            <div class="filtro-grupo">
                <label for="filtroDepartamento"><span>🗺️</span> DEPARTAMENTO</label>
                <input type="text" id="filtroDepartamento" placeholder="DEPARTAMENTO" autocomplete="off">
            </div>
            <div class="filtro-grupo">
                <label for="filtroProvincia"><span>🏙️</span> PROVINCIA</label>
                <input type="text" id="filtroProvincia" placeholder="PROVINCIA autocomplete="off">
            </div>
            <div class="filtro-grupo">
                <label for="filtroDistrito"><span>🏘️</span> DISTRITO</label>
                <input type="text" id="filtroDistrito" placeholder="DISTRITO" autocomplete="off">
            </div>
            <div class="filtro-grupo">
                <label for="filtroUrbanizacion"><span>📍</span> URBANIZACIÓN / LOCALIDAD</label>
                <input type="text" id="filtroUrbanizacion" placeholder="URBANIZACIÓN" autocomplete="off">
            </div>
        </div>
    </div>

    <div class="tabla-card">
        <div class="tabla-header-info">
            <div class="contador-resultados" id="contadorResultados">
                Registros encontrados: <span>Cargando...</span>
            </div>
        </div>
        
        <div class="tabla-wrapper" id="tablaWrapper">
            <table>
                <thead>
                    <tr>
                        <th>🔢 UBIGEO</th>
                        <th>🗺️ DEPARTAMENTO</th>
                        <th>🏙️ PROVINCIA</th>
                        <th>🏘️ DISTRITO</th>
                        <th>📍 URBANIZACIÓN</th>
                        <th>📡 COBERTURA</th>
                    </tr>
                </thead>
                <tbody id="tablaResultados">
                    <tr>
                        <td colspan="6">
                            <div class="estado-vacio">
                                <span>⏳</span>
                                <h3>Cargando base de datos</h3>
                                <p>Por favor espere un momento...</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let datosCobertura = [];
    let datosFiltrados = [];
    
    // Scroll Infinito
    let indiceActual = 0;
    const filasPorLote = 100; 

    const tbody = document.getElementById('tablaResultados');
    const inputs = document.querySelectorAll('.filtros-container input');
    const tablaWrapper = document.getElementById('tablaWrapper');
    const contadorResultadosSpan = document.querySelector('#contadorResultados span');
    
    let temporizadorBusqueda;

    // Normalizador de texto
    function normalizarTexto(texto) {
        if (!texto) return "";
        return String(texto)
            .normalize("NFD") 
            .replace(/[\u0300-\u036f]/g, "") 
            .toLowerCase()
            .trim();
    }

    // 1. CARGA INICIAL
    fetch('datos.json')
        .then(respuesta => {
            if (!respuesta.ok) throw new Error('Error JSON');
            return respuesta.json();
        })
        .then(datos => {
            datosCobertura = datos;
            datosFiltrados = [...datosCobertura]; 
            ordenarDatos();
            iniciarRenderizado();
        })
        .catch(error => {
            tbody.innerHTML = `
                <tr>
                    <td colspan="6">
                        <div class="estado-vacio">
                            <span>❌</span>
                            <h3>Error de conexión</h3>
                            <p>No se pudo enlazar el archivo datos.json. Verifica la sintaxis del archivo.</p>
                        </div>
                    </td>
                </tr>`;
            contadorResultadosSpan.textContent = "Error";
        });

    // 2. EVENTOS BÚSQUEDA
    inputs.forEach(input => {
        input.addEventListener('input', () => {
            clearTimeout(temporizadorBusqueda);
            temporizadorBusqueda = setTimeout(() => {
                filtrarDatos();
            }, 250);
        });
    });

    // 3. EVENTO SCROLL
    tablaWrapper.addEventListener('scroll', () => {
        const scrollCercaDelFondo = tablaWrapper.scrollTop + tablaWrapper.clientHeight >= tablaWrapper.scrollHeight - 100;
        if (scrollCercaDelFondo) {
            cargarMasFilas();
        }
    });

    // 4. FILTRADO
    function filtrarDatos() {
        const uVal = document.getElementById('filtroUbigeo').value.trim().toLowerCase();
        const depVal = normalizarTexto(document.getElementById('filtroDepartamento').value);
        const provVal = normalizarTexto(document.getElementById('filtroProvincia').value);
        const distVal = normalizarTexto(document.getElementById('filtroDistrito').value);
        const urbVal = normalizarTexto(document.getElementById('filtroUrbanizacion').value);

        datosFiltrados = datosCobertura.filter(item => {
            const ubigeoStr = String(item.UBIGEO || "").toLowerCase();
            const depStr = normalizarTexto(item.Departamento);
            const provStr = normalizarTexto(item.Provincia);
            const distStr = normalizarTexto(item.Distrito);
            const urbStr = normalizarTexto(item.Urbanizacion);

            const coincideUbigeo = ubigeoStr.includes(uVal);
            const coincideDep = depVal === "" || (" " + depStr).includes(" " + depVal);
            const coincideProv = provVal === "" || (" " + provStr).includes(" " + provVal);
            const coincideDist = distVal === "" || (" " + distStr).includes(" " + distVal);
            const coincideUrb = urbVal === "" || (" " + urbStr).includes(" " + urbVal);

            return coincideUbigeo && coincideDep && coincideProv && coincideDist && coincideUrb;
        });

        ordenarDatos();
        iniciarRenderizado();
    }

    // Ordenamiento
    function ordenarDatos() {
        datosFiltrados.sort((a, b) => {
            const depA = String(a.Departamento || "");
            const depB = String(b.Departamento || "");
            const compDep = depA.localeCompare(depB, 'es', { sensitivity: 'base' });
            if (compDep !== 0) return compDep;

            const provA = String(a.Provincia || "");
            const provB = String(b.Provincia || "");
            const compProv = provA.localeCompare(provB, 'es', { sensitivity: 'base' });
            if (compProv !== 0) return compProv;

            const distA = String(a.Distrito || "");
            const distB = String(b.Distrito || "");
            return distA.localeCompare(distB, 'es', { sensitivity: 'base' });
        });
    }

    // 5. RENDERIZADO (DOM Seguro)
    function iniciarRenderizado() {
        tbody.innerHTML = ''; 
        indiceActual = 0; 
        tablaWrapper.scrollTop = 0; 

        if (datosFiltrados.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="6">
                        <div class="estado-vacio">
                            <span>🔍</span>
                            <h3>Sin resultados</h3>
                            <p>No se encontraron zonas de cobertura con esos filtros.</p>
                        </div>
                    </td>
                </tr>`;
            contadorResultadosSpan.textContent = `0`;
            return;
        }

        contadorResultadosSpan.textContent = new Intl.NumberFormat('es-PE').format(datosFiltrados.length);
        cargarMasFilas(); 
    }

    function cargarMasFilas() {
        if (indiceActual >= datosFiltrados.length) return;

        const fragmento = document.createDocumentFragment();
        const indiceFin = Math.min(indiceActual + filasPorLote, datosFiltrados.length);
        const datosLote = datosFiltrados.slice(indiceActual, indiceFin);

        datosLote.forEach(item => {
            const tr = document.createElement('tr');
            
            let coberturaClase = 'pendiente';
            const coberturaTexto = String(item.Cobertura || "").trim(); 
            const textoEvaluar = coberturaTexto.toLowerCase();
            
            if (textoEvaluar.includes('no cubre')) {
                coberturaClase = 'no-cubre';
            } else if (textoEvaluar.includes('take') || textoEvaluar.includes('si') || textoEvaluar.includes('contraentrega') || coberturaTexto.length > 0) {
                coberturaClase = 'si-cubre';
            }

            tr.innerHTML = `
                <td><strong>${item.UBIGEO || ''}</strong></td>
                <td>${item.Departamento || ''}</td>
                <td>${item.Provincia || ''}</td>
                <td>${item.Distrito || ''}</td>
                <td>${item.Urbanizacion || ''}</td>
                <td><span class="badge ${coberturaClase}">${coberturaTexto}</span></td>
            `;
            fragmento.appendChild(tr);
        });

        tbody.appendChild(fragmento);
        indiceActual = indiceFin; 
    }
</script>

</body>
</html>
