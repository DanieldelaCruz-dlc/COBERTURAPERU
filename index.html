<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COBERTURA PERÚ</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    
    <div class="app-header">
        <div class="header-titles">
            <h1>COBERTURA PERÚ</h1>
            <p>Chicos usen esta cobertura hasta que funcione la del nucleo</p>
        </div>
    </div>

    <div class="filtros-card">
        <div class="filtros-card-title">🔍 BUSCADOR</div>
        <div class="filtros-container">
            <div class="filtro-grupo">
                <label for="filtroUbigeo">🔢 UBIGEO</label>
                <input type="text" id="filtroUbigeo" placeholder="COD POSTAL" autocomplete="off">
            </div>
            <div class="filtro-grupo">
                <label for="filtroDepartamento">🗺️ DEPARTAMENTO</label>
                <input type="text" id="filtroDepartamento" placeholder="DEPARTAMENTO" autocomplete="off">
            </div>
            <div class="filtro-grupo">
                <label for="filtroProvincia">🏙️ PROVINCIA</label>
                <input type="text" id="filtroProvincia" placeholder="PROVINCIA" autocomplete="off">
            </div>
            <div class="filtro-grupo">
                <label for="filtroDistrito">🏘️ DISTRITO</label>
                <input type="text" id="filtroDistrito" placeholder="DISTRITO" autocomplete="off">
            </div>
            <div class="filtro-grupo">
                <label for="filtroUrbanizacion">📍 URBANIZACIÓN / LOCALIDAD</label>
                <input type="text" id="filtroUrbanizacion" placeholder="URBANIZACION" autocomplete="off">
            </div>
        </div>
    </div>

    <div class="tabla-card">
        <div class="tabla-header-info">
            <div class="contador-resultados" id="contadorResultados">
                Registros encontrados: <span>Cargando...</span>
            </div>
        </div>
        
        <div class="tabla-wrapper" id="tablaWrapper">
            <table>
                <thead>
                    <tr>
                        <th>🔢 UBIGEO</th>
                        <th>🗺️ DEPARTAMENTO</th>
                        <th>🏙️ PROVINCIA</th>
                        <th>🏘️ DISTRITO</th>
                        <th>📍 URBANIZACIÓN</th>
                        <th>📡 COBERTURA</th>
                    </tr>
                </thead>
                <tbody id="tablaResultados">
                    <tr>
                        <td colspan="6">
                            <div class="estado-vacio">
                                ⏳
                                <h3>Cargando base de datos</h3>
                                <p>Por favor espere un momento...</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let datosCobertura = [];
    let datosFiltrados = [];
    
    // Configuración del Scroll Infinito
    let indiceActual = 0;
    const filasPorLote = 100; 

    const tbody = document.getElementById('tablaResultados');
    const inputs = document.querySelectorAll('.filtros-container input');
    const tablaWrapper = document.getElementById('tablaWrapper');
    const contadorResultadosSpan = document.querySelector('#contadorResultados span');
    
    let temporizadorBusqueda;

    function normalizarTexto(texto) {
        if (!texto) return "";
        return String(texto)
            .normalize("NFD") 
            .replace(/[\u0300-\u036f]/g, "") 
            .toLowerCase()
            .trim();
    }

    // 1. CARGA INICIAL
    fetch('datos.json')
        .then(respuesta => {
            if (!respuesta.ok) throw new Error('Error JSON');
            return respuesta.json();
        })
        .then(datos => {
            datosCobertura = datos;
            datosFiltrados = [...datosCobertura]; 
            ordenarDatos();
            iniciarRenderizado();
        })
        .catch(error => {
            tbody.innerHTML = `
                <tr>
                    <td colspan="6">
                        <div class="estado-vacio">
                            ❌
                            <h3>Error de conexión</h3>
                            <p>No se pudo enlazar el archivo datos.json.</p>
                        </div>
                    </td>
                </tr>`;
            contadorResultadosSpan.textContent = "Error";
        });

    // 2. EVENTOS BÚSQUEDA
    inputs.forEach(input => {
        input.addEventListener('input', () => {
            clearTimeout(temporizadorBusqueda);
            temporizadorBusqueda = setTimeout(() => {
                filtrarDatos();
            }, 250);
        });
    });

    // 3. EVENTO SCROLL
    tablaWrapper.addEventListener('scroll', () => {
        const scrollCercaDelFondo = tablaWrapper.scrollTop + tablaWrapper.clientHeight >= tablaWrapper.scrollHeight - 100;
        if (scrollCercaDelFondo) {
            cargarMasFilas();
        }
    });

    // 4. LÓGICA DE FILTRADO
    function filtrarDatos() {
        const uVal = document.getElementById('filtroUbigeo').value.trim().toLowerCase();
        const depVal = normalizarTexto(document.getElementById('filtroDepartamento').value);
        const provVal = normalizarTexto(document.getElementById('filtroProvincia').value);
        const distVal = normalizarTexto(document.getElementById('filtroDistrito').value);
        const urbVal = normalizarTexto(document.getElementById('filtroUrbanizacion').value);

        datosFiltrados = datosCobertura.filter(item => {
            const ubigeoStr = String(item.UBIGEO || "").toLowerCase();
            const depStr = normalizarTexto(item.Departamento);
            const provStr = normalizarTexto(item.Provincia);
            const distStr = normalizarTexto(item.Distrito);
            const urbStr = normalizarTexto(item.Urbanizacion);

            const coincideUbigeo = ubigeoStr.includes(uVal);
            const coincideDep = depVal === "" || (" " + depStr).includes(" " + depVal);
            const coincideProv = provVal === "" || (" " + provStr).includes(" " + provVal);
            const coincideDist = distVal === "" || (" " + distStr).includes(" " + distVal);
            const coincideUrb = urbVal === "" || (" " + urbStr).includes(" " + urbVal);

            return coincideUbigeo && coincideDep && coincideProv && coincideDist && coincideUrb;
        });

        ordenarDatos();
        iniciarRenderizado();
    }

    function ordenarDatos() {
        datosFiltrados.sort((a, b) => {
            const depA = String(a.Departamento || "");
            const depB = String(b.Departamento || "");
            const compDep = depA.localeCompare(depB, 'es', { sensitivity: 'base' });
            if (compDep !== 0) return compDep;

            const provA = String(a.Provincia || "");
            const provB = String(b.Provincia || "");
            const compProv = provA.localeCompare(provB, 'es', { sensitivity: 'base' });
            if (compProv !== 0) return compProv;

            const distA = String(a.Distrito || "");
            const distB = String(b.Distrito || "");
            return distA.localeCompare(distB, 'es', { sensitivity: 'base' });
        });
    }

    // 5. RENDERIZADO
    function iniciarRenderizado() {
        tbody.innerHTML = ''; 
        indiceActual = 0; 
        tablaWrapper.scrollTop = 0; 

        if (datosFiltrados.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="6">
                        <div class="estado-vacio">
                            🔍
                            <h3>Sin resultados</h3>
                            <p>No se encontraron zonas de cobertura con esos filtros.</p>
                        </div>
                    </td>
                </tr>`;
            contadorResultadosSpan.textContent = `0`;
            return;
        }

        contadorResultadosSpan.textContent = new Intl.NumberFormat('es-PE').format(datosFiltrados.length);
        cargarMasFilas(); 
    }

    function cargarMasFilas() {
        if (indiceActual >= datosFiltrados.length) return;

        const fragmento = document.createDocumentFragment();
        const indiceFin = Math.min(indiceActual + filasPorLote, datosFiltrados.length);
        const datosLote = datosFiltrados.slice(indiceActual, indiceFin);

        datosLote.forEach(item => {
            const tr = document.createElement('tr');
            
            let coberturaClase = 'pendiente';
            const coberturaTexto = String(item.Cobertura || "").trim(); 
            const textoEvaluar = coberturaTexto.toLowerCase();
            
            if (textoEvaluar.includes('no cubre')) {
                coberturaClase = 'no-cubre';
            } else if (textoEvaluar.includes('take') || textoEvaluar.includes('si') || textoEvaluar.includes('contraentrega') || coberturaTexto.length > 0) {
                coberturaClase = 'si-cubre';
            }

            tr.innerHTML = `
                <td><strong>${item.UBIGEO || ''}</strong></td>
                <td>${item.Departamento || ''}</td>
                <td>${item.Provincia || ''}</td>
                <td>${item.Distrito || ''}</td>
                <td>${item.Urbanizacion || ''}</td>
                <td><span class="badge ${coberturaClase}">${coberturaTexto}</span></td>
            `;
            fragmento.appendChild(tr);
        });

        tbody.appendChild(fragmento);
        indiceActual = indiceFin; 
    }
</script>

</body>
</html>
